<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theatre Technical Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --stage-dark: #050505;
            --spotlight: rgba(255, 255, 255, 0.08);
            --accent-steel: #a0a0a0;
            --text-main: #d1d1d1;
            --font-mono: 'Space Mono', monospace;
        }

        body {
            font-family: var(--font-mono);
            background-color: var(--stage-dark);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- THE THEATRE STAGE --- */
        .theatre-floor {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35vh;
            background: #0a0a0a;
            border-top: 1px solid #1a1a1a;
            box-shadow: inset 0 20px 50px #000;
            z-index: 1;
        }

        .stage-view {
            perspective: 1200px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            flex-grow: 1;
            width: 100%;
            position: relative;
            z-index: 2;
            padding-bottom: 10vh;
        }

        .projector-array {
            display: flex;
            gap: 150px;
            padding: 0 50vw;
            overflow-x: scroll;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            height: 80vh;
            align-items: flex-end;
        }

        .projector-array::-webkit-scrollbar { display: none; }

        /* --- THE PROJECTOR UNIT --- */
        .projector-unit {
            scroll-snap-align: center;
            flex: 0 0 400px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- THE PROJECTION (THE "HOLOGRAM") --- */
        .projection-screen {
            width: 380px;
            aspect-ratio: 16/9;
            background: #000;
            border: 1px solid #333;
            position: relative;
            transform: translateZ(-50px) translateY(20px);
            opacity: 0.2;
            transition: all 0.6s ease;
            overflow: hidden;
        }

        /* Scanline Overlay for a "Projected" look */
        .projection-screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 2;
            pointer-events: none;
        }

        .projection-screen img, .projection-screen video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(1.1);
        }

        /* --- THE SPOTLIGHT CONE --- */
        .spotlight-cone {
            position: absolute;
            bottom: 0;
            width: 300px;
            height: 500px;
            background: conic-gradient(from 165deg at 50% 100%, var(--spotlight) 0deg, transparent 30deg, transparent 330deg, var(--spotlight) 360deg);
            filter: blur(15px);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        /* --- MECHANICAL BASE --- */
        .projector-base {
            width: 80px;
            height: 12px;
            background: #151515;
            border: 1px solid #252525;
            margin-top: 10px;
            position: relative;
            z-index: 3;
        }

        /* --- ACTIVE STATE --- */
        .projector-unit.active {
            transform: translateZ(150px) translateY(-30px);
        }

        .projector-unit.active .projection-screen {
            opacity: 1;
            transform: translateZ(0) translateY(0);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border-color: #555;
        }

        .projector-unit.active .spotlight-cone {
            opacity: 1;
        }

        /* --- INFO PANEL --- */
        .info-panel {
            margin-top: 40px;
            text-align: center;
            width: 300px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
        }

        .projector-unit.active .info-panel {
            opacity: 1;
            transform: translateY(0);
        }

        h2 { font-size: 1rem; text-transform: uppercase; margin-bottom: 5px; color: #fff; }
        p { font-size: 0.75rem; color: #888; margin: 0; }

        .nav-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: #444;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="theatre-floor"></div>

<div class="stage-view">
    <div class="projector-array" id="projectorArray">

        <div class="projector-unit">
            <div class="projection-screen">
                <video autoplay loop muted playsinline><source src="metroid.mp4" type="video/mp4"></video>
            </div>
            <div class="spotlight-cone"></div>
            <div class="projector-base"></div>
            <div class="info-panel">
                <h2>Metroidbrainia Engine</h2>
                <p>Knowledge-gated systemic simulation.</p>
            </div>
        </div>

        <div class="projector-unit">
            <div class="projection-screen">
                <img src="grass.gif" alt="Shader Logic">
            </div>
            <div class="spotlight-cone"></div>
            <div class="projector-base"></div>
            <div class="info-panel">
                <h2>Procedural Grass</h2>
                <p>Vertex noise displacement via Godot 4.</p>
            </div>
        </div>

        <div class="projector-unit">
            <div class="projection-screen">
                <video autoplay loop muted playsinline><source src="gravity.mp4" type="video/mp4"></video>
            </div>
            <div class="spotlight-cone"></div>
            <div class="projector-base"></div>
            <div class="info-panel">
                <h2>Planetary Gravity</h2>
                <p>Custom C++ physics integration.</p>
            </div>
        </div>

    </div>
</div>

<div class="nav-hint">SCROLL HORIZONTALLY TO CYCLE PROJECTS</div>

<script>
    const array = document.getElementById('projectorArray');
    const units = document.querySelectorAll('.projector-unit');

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
            } else {
                entry.target.classList.remove('active');
            }
        });
    }, {
        root: array,
        threshold: 0.7
    });

    units.forEach(unit => observer.observe(unit));
</script>

</body>
</html>
